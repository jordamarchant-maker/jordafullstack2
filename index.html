<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página Web</title>
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- NAVBAR BOOTSTRAP -->
  <nav class="navbar navbar-expand-md navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Mi Sitio</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menuNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contacto</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- CABECERA con Flexbox -->
  <header class="cabecera">
    <div class="cabecera-texto">
      <h1>Bienvenido a mi página</h1>
      <p>Esta es mi primera página web responsiva.</p>
    </div>
    <div class="cabecera-imagen">
      <img src="img/fran2.png" alt="Mi foto">
    </div>
  </header>

  <!-- CONTENIDO PRINCIPAL con CSS Grid -->
  <main class="contenido-grid">
    <section class="principal">
      <h2>Sobre mí</h2>
      <p>Aquí va el contenido principal de la página. Se adapta al tamaño de la pantalla.</p>
      <div class="tarjetas">
        <div class="tarjeta">Producto 1</div>
        <div class="tarjeta">Producto 2</div>
        <div class="tarjeta">Producto 3</div>
      </div>
    </section>
    <aside class="lateral">
      <h2>Sidebar</h2>
      <p>Barra lateral con información extra.</p>
    </aside>
  </main>

  <!-- BOTÓN IR ARRIBA -->
  <div style="text-align:center; padding: 2rem;">
    <button id="btnArriba" class="btn btn-dark">Ir arriba</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
